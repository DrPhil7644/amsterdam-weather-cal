name: Update Amsterdam Weather ICS

on:
  schedule:
    - cron: '0 5 * * *'   # 07:00 Amsterdam time (CET/CEST)
  workflow_dispatch:        # allow manual run from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate ICS from weeronline.nl
        run: python3 generate_ics.py

      - name: Commit updated forecast
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/amsterdam-weather.ics
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: update Amsterdam weather forecast $(date -u +%Y-%m-%d)"
          git push
